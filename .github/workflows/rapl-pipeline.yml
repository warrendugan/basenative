name: RAPL Pipeline (Red → Amber → Pact → Live)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NX_BRANCH: ${{ github.event.number }}
  NX_RUN_GROUP: ${{ github.run_id }}

jobs:
  # RED: Unit Tests & Lint
  red:
    name: 🔴 RED - Unit Tests & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive appropriate SHAs for base and head for `nx affected`
        uses: nrwl/nx-set-shas@v4

      - name: Run Linting
        run: npx nx affected --target=lint --exclude='*-e2e'

      - name: Run Unit Tests
        run: npx nx affected --target=test --exclude='*-e2e' --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json

  # AMBER: Integration Tests with MSW
  amber:
    name: 🟠 AMBER - Integration Tests (MSW Mocks)
    runs-on: ubuntu-latest
    needs: red
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive appropriate SHAs for base and head for `nx affected`
        uses: nrwl/nx-set-shas@v4

      - name: Run integration tests with MSW
        run: npx nx affected --target=integration-test --exclude='*-e2e'

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: coverage/

  # PACT: Contract Testing
  pact:
    name: 📋 PACT - Consumer-Driven Contract Testing
    runs-on: ubuntu-latest
    needs: amber
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive appropriate SHAs for base and head for `nx affected`
        uses: nrwl/nx-set-shas@v4

      - name: Run Pact consumer tests (local verification)
        run: npx nx run tools-pact:test
        env:
          CI: 'true'

      - name: Upload Pact files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pact-contracts
          path: pacts/

  # LIVE: E2E & Preview Deployment
  live:
    name: 🟢 LIVE - E2E & Preview Deployment
    runs-on: ubuntu-latest
    needs: pact
    timeout-minutes: 35
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build apps
        run: |
          npx nx run greenput:build:production
          npx nx run showcase:build:production
          npx nx run api-gateway:build:production

      - name: Deploy to Cloudflare Pages (preview)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: basenative
          directory: dist/apps/showcase/browser
          productionBranch: main

      - name: Setup Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx nx run showcase-e2e:e2e
        env:
          CI: 'true'

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: dist/apps/showcase-e2e/

  # Deploy: Only after all stages pass on main
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [red, amber, pact, live]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger main deployment workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                app: 'all'
              }
            });

      - name: Create GitHub Release
        uses: actions/create-release@v1
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          body: |
            Production deployment successful.

            Commits: ${{ github.event.head_commit.url }}

            All RAPL gates passed:
            - 🔴 RED: Unit tests & lint
            - 🟠 AMBER: Integration tests
            - 📋 PACT: Contract verification
            - 🟢 LIVE: E2E & preview
            - 🚀 DEPLOY: Production deployment triggered
