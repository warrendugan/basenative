name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'apps/greenput-api/**'
      - 'apps/greenput-api/wrangler.toml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: '22'
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy-worker:
    name: Deploy greenput-api Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npx tsc --noEmit

      - name: Build greenput-api Worker
        run: npx nx build greenput-api --configuration=production

      - name: Deploy Worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          command: deploy --config apps/greenput-api/wrangler.toml
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          echo "Waiting for Worker to be live..."
          for i in {1..10}; do
            if curl -f --silent --max-time 5 https://api.duganlabs.com/health 2>/dev/null; then
              echo "✓ Worker is live"
              exit 0
            fi
            echo "Attempt $i/10 - retrying in 5 seconds..."
            sleep 5
          done
          echo "⚠ Worker health check did not respond after 10 attempts, but deployment may still be processing"
          exit 0
        continue-on-error: true
