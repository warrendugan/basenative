name: Deploy Ecosystem to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy (all, greenput, duganlabs, showcase, greenput-api)'
        required: false
        default: 'all'

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  # Build stage: Compile all apps with production config
  build:
    name: Build Apps
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        app: [greenput, duganlabs, showcase]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }}
        run: npx nx build ${{ matrix.app }} --configuration=production

      - name: Upload ${{ matrix.app }} build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: dist/apps/${{ matrix.app }}/browser
          retention-days: 1

  # Build the Worker separately
  build-worker:
    name: Build Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npx tsc --noEmit

      - name: Build greenput-api Worker
        run: npx nx build greenput-api --configuration=production

      - name: Upload Worker build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-worker
          path: apps/greenput-api
          retention-days: 1

  # Deploy Pages: Deploy each Angular app to Cloudflare Pages
  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    strategy:
      matrix:
        include:
          - app: greenput
            project: greenput
          - app: duganlabs
            project: duganlabs
          - app: showcase
            project: basenative
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ${{ matrix.app }} artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: dist/apps/${{ matrix.app }}/browser

      - name: Deploy ${{ matrix.app }} to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          command: pages deploy dist/apps/${{ matrix.app }}/browser --project-name=${{ matrix.project }}
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

  # Deploy Worker: Deploy greenput-api Worker to Cloudflare
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: build-worker
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' && (
        github.event.inputs.app == 'all' ||
        github.event.inputs.app == 'greenput-api'
      )
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Worker artifact
        uses: actions/download-artifact@v4
        with:
          name: build-worker
          path: apps/greenput-api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy greenput-api Worker
        uses: cloudflare/wrangler-action@v3
        with:
          command: deploy --config apps/greenput-api/wrangler.toml
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

  # Verify: Health check all deployed services
  verify:
    name: Verify Deployments
    runs-on: ubuntu-latest
    needs: [deploy-pages, deploy-worker]
    if: always()
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for deployments to be live
        run: sleep 10

      - name: Health check - greenput
        run: |
          for i in {1..5}; do
            if curl -f --silent --max-time 5 https://greenput.com/health 2>/dev/null; then
              echo "✓ greenput is live"
              exit 0
            fi
            if [ $i -lt 5 ]; then sleep 5; fi
          done
          echo "⚠ greenput health check did not respond, but deployment may still be processing"

      - name: Health check - duganlabs
        run: |
          for i in {1..5}; do
            if curl -f --silent --max-time 5 https://duganlabs.com/health 2>/dev/null; then
              echo "✓ duganlabs is live"
              exit 0
            fi
            if [ $i -lt 5 ]; then sleep 5; fi
          done
          echo "⚠ duganlabs health check did not respond, but deployment may still be processing"

      - name: Health check - showcase
        run: |
          for i in {1..5}; do
            if curl -f --silent --max-time 5 https://basenative.com/health 2>/dev/null; then
              echo "✓ showcase is live"
              exit 0
            fi
            if [ $i -lt 5 ]; then sleep 5; fi
          done
          echo "⚠ showcase health check did not respond, but deployment may still be processing"

      - name: Health check - API Worker
        run: |
          for i in {1..5}; do
            if curl -f --silent --max-time 5 https://api.duganlabs.com/health 2>/dev/null; then
              echo "✓ greenput-api Worker is live"
              exit 0
            fi
            if [ $i -lt 5 ]; then sleep 5; fi
          done
          echo "⚠ greenput-api health check did not respond, but deployment may still be processing"
